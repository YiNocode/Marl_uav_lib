# MAPPO on PyFlyt 3v1 pursuit experiment config
#
# - Env:   PyFlytAviaryEnv + pursuit_evasion_3v1_ex1（marl_uav...pursuit_evasion_3v1_task_ex1）
# - Algo:  IPPO (independent PPO with shared actor-critic)
# - Model: MLP actor-critic policy

env: configs/env/pyflyt_3v1.yaml
algo: configs/algo/mappo.yaml
model: configs/model/centralized_critic.yaml

# task.name: pursuit_evasion_3v1（原版）或 pursuit_evasion_3v1_ex1（结构感知 obs +16）
task:
  name: pursuit_evasion_3v1_ex1
  world_xy: 20.0
  z_min: 0.5
  z_max: 5.0
  capture_dist: 1
  episode_limit: 1000
  pursuer_speed: 0.20
  evader_speed: 0.06
  min_pursuer_sep: 0.6
  progress_reward_scale: 1.0
  min_progress_reward_scale: 0.5
  time_penalty: 0.05
  capture_bonus: 200.0
  collision_penalty: 2.0
  oob_penalty: 30.0
  evader_boundary_gain: 0.8
  mean_progress_reward_scale: 0.5   # 新增
  capture_bonus_team: 30.0          # 新增
  capture_bonus_individual: 10.0    # 新增
  progress_dist_norm: 2.0           # 新增，固定参考尺度



# Training schedule / misc
seed: 10
num_epochs: 30000
rollout_steps: 2048
log_interval: 1
eval_episodes: 20


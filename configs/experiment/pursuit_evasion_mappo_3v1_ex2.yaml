# MAPPO on PyFlyt 3v1 pursuit with cylindrical obstacles (ex2)
#
# - Env:   PyFlytAviaryEnv + pursuit_evasion_3v1_ex2（marl_uav...pursuit_evasion_3v1_task_ex2）
# - 每回合 5~10 根圆柱障碍；pursuer 在任务几何意义上碰柱即 terminated

env: configs/env/pyflyt_3v1.yaml
algo: configs/algo/mappo.yaml
model: configs/model/centralized_critic.yaml

task:
  name: pursuit_evasion_3v1_ex2
  world_xy: 20.0
  z_min: 0.5
  z_max: 5.0
  capture_dist: 1
  episode_limit: 1000
  pursuer_speed: 0.20
  evader_speed: 0.06
  min_pursuer_sep: 0.6
  progress_reward_scale: 2.0
  min_progress_reward_scale: 1.0
  time_penalty: 0.001
  capture_bonus: 200.0
  collision_penalty: 2.0
  oob_penalty: 30.0
  evader_boundary_gain: 0.8
  mean_progress_reward_scale: 2.0
  capture_bonus_team: 30.0
  capture_bonus_individual: 10.0
  progress_dist_norm: 2.0
  # ex2 障碍（可按场景再调）
  num_obstacles_min: 5
  num_obstacles_max: 10
  obstacle_collision_penalty: 15.0

seed: 100
num_epochs: 30000
rollout_steps: 2048
log_interval: 1
eval_episodes: 20

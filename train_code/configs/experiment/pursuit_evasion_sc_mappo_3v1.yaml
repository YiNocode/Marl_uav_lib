# PyFlyt PursuitEvasion3v1 + SC-MAPPO（CentralizedCriticPolicy）

env: configs/env/pyflyt_3v1.yaml
algo: configs/algo/sc_mappo.yaml
model: configs/model/centralized_critic.yaml

task:
  name: pursuit_evasion_3v1
  world_xy: 3.0
  z_min: 0.5
  z_max: 2.0
  capture_dist: 0.5
  episode_limit: 500
  pursuer_speed: 0.20
  evader_speed: 0.06
  min_pursuer_sep: 0.25
  progress_reward_scale: 2.0
  min_progress_reward_scale: 1.0
  time_penalty: 0.04
  capture_bonus: 200.0
  collision_penalty: 2.0
  oob_penalty: 3.0
  evader_boundary_gain: 0.8

seed: 100
num_epochs: 100000
rollout_steps: 512
log_interval: 1
eval_episodes: 20
